services:
  vue-app:
    image: node:22-alpine
    container_name: vue_dev_server
    working_dir: /app
    ports:
      - "5173:5173" # Puerto por defecto de Vite
    volumes:
      - .:/app
      # Evita que Docker sobreescriba los node_modules locales con los del contenedor
      - /app/node_modules
    # Comando para instalar dependencias y arrancar el servidor
    command: sh -c "npm install && npm run dev -- --host"